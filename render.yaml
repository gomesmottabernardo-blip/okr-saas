services:
  - type: web
    name: okr-saas-api
    runtime: node
    rootDir: Back/server
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # definir manualmente no painel do Render
      - key: JWT_SECRET
        sync: false   # definir manualmente no painel do Render
      - key: ALLOWED_ORIGINS
        sync: false   # definir com a URL da Vercel após o deploy do frontend
      - key: NOTION_TOKEN
        sync: false   # token de integração do Notion
      - key: NOTION_DATABASE_ID
        sync: false   # ID do banco de tarefas: f5c1b06e-61d1-4f83-b588-f868d0fc982f
